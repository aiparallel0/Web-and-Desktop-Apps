# mypy configuration for Receipt Extractor
# Type checking configuration with gradual typing approach

[mypy]
# Python version
python_version = 3.11

# Import discovery
mypy_path = .
namespace_packages = True

# General options
warn_return_any = True
warn_unused_configs = True
warn_redundant_casts = True
warn_unused_ignores = False
warn_no_return = True
warn_unreachable = True

# Strictness options (start lenient, increase gradually)
disallow_untyped_defs = False
check_untyped_defs = True
disallow_any_generics = False
disallow_incomplete_defs = False
disallow_subclassing_any = False

# Error messages
show_error_context = True
show_column_numbers = True
show_error_codes = True
pretty = True

# Disable errors for third-party libraries without stubs
[mypy-numpy.*]
ignore_missing_imports = True

[mypy-PIL.*]
ignore_missing_imports = True

[mypy-cv2.*]
ignore_missing_imports = True

[mypy-torch.*]
ignore_missing_imports = True

[mypy-transformers.*]
ignore_missing_imports = True

[mypy-easyocr.*]
ignore_missing_imports = True

[mypy-paddleocr.*]
ignore_missing_imports = True

[mypy-pytesseract.*]
ignore_missing_imports = True

[mypy-psutil.*]
ignore_missing_imports = True

[mypy-flask.*]
ignore_missing_imports = True

[mypy-flask_cors.*]
ignore_missing_imports = True

[mypy-sqlalchemy.*]
ignore_missing_imports = True

[mypy-stripe.*]
ignore_missing_imports = True

[mypy-boto3.*]
ignore_missing_imports = True

[mypy-botocore.*]
ignore_missing_imports = True

[mypy-google.*]
ignore_missing_imports = True

[mypy-dropbox.*]
ignore_missing_imports = True

# Test files - be more lenient
[mypy-tools.tests.*]
ignore_errors = True

[mypy-tests.*]
ignore_errors = True

# Scripts and utilities - lenient
[mypy-tools.scripts.*]
ignore_errors = True

[mypy-tools.benchmarks.*]
ignore_errors = True

[mypy-examples.*]
ignore_errors = True

# Migration files
[mypy-migrations.*]
ignore_errors = True
