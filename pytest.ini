[pytest]
# Pytest configuration for Receipt Extractor

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --cov=shared
    --cov=web-app/backend
    --cov-report=html
    --cov-report=term-missing

# Markers for categorizing tests
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, require dependencies)
    model: Model tests (require AI models downloaded)
    slow: Slow tests (may take minutes)
    web: Web app tests
    desktop: Desktop app tests

# Ignore patterns
norecursedirs = .git .tox dist build *.egg venv node_modules

# Coverage options
[coverage:run]
source = shared,web-app/backend
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */venv/*
    */node_modules/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
