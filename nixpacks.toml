# Railway Nixpacks configuration for OCR dependencies
# Installs system packages required for OpenCV and Tesseract

[phases.setup]
# System packages needed for image processing and OCR
nixPkgs = [
    "tesseract",      # Tesseract OCR binary
    "opencv4",        # OpenCV library
    "libGL",          # OpenGL library (required by OpenCV)
    "glib",           # GLib library (required by OpenCV)
    "zlib",           # Compression library
    "libpng",         # PNG support
    "libjpeg"         # JPEG support
]

[phases.install]
# Install Python dependencies
cmds = [
    "pip install --upgrade pip",
    "pip install -r requirements.txt"
]

[phases.build]
# Generate version.json for cache busting
cmds = [
    "python web/cache-bust.py"
]

[start]
# Start command for production
cmd = "gunicorn -w 4 -b 0.0.0.0:$PORT --timeout 120 web.backend.app:app"
