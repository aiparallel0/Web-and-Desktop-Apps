<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create your Receipt Extractor account - Start extracting receipt data with AI">
    <meta name="theme-color" content="#3B82F6">
    
    <title>Sign Up | Receipt Extractor</title>
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="styles/design-system.css">
    <link rel="stylesheet" href="styles/animations.css">
    <link rel="stylesheet" href="styles.css">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-192x192.png">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            padding: 40px 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 500px;
        }

        .auth-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 
                       0 10px 10px -5px rgba(0, 0, 0, 0.04);
            padding: 40px;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-logo {
            width: 64px;
            height: 64px;
            margin: 0 auto 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 32px;
            font-weight: 700;
        }

        .auth-title {
            font-size: 28px;
            font-weight: 700;
            color: #111827;
            margin: 0 0 8px 0;
        }

        .auth-subtitle {
            font-size: 16px;
            color: #6B7280;
            margin: 0;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 6px;
        }

        .form-label .required {
            color: #DC2626;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #E5E7EB;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-sizing: border-box;
        }

        .form-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-input.error {
            border-color: #DC2626;
        }

        .password-strength {
            margin-top: 8px;
            height: 4px;
            background: #E5E7EB;
            border-radius: 2px;
            overflow: hidden;
        }

        .password-strength-bar {
            height: 100%;
            width: 0;
            transition: width 0.3s, background-color 0.3s;
        }

        .password-strength-bar.weak {
            width: 33%;
            background: #DC2626;
        }

        .password-strength-bar.medium {
            width: 66%;
            background: #F59E0B;
        }

        .password-strength-bar.strong {
            width: 100%;
            background: #10B981;
        }

        .password-requirements {
            margin-top: 8px;
            font-size: 13px;
            color: #6B7280;
        }

        .password-requirements ul {
            margin: 4px 0;
            padding-left: 20px;
        }

        .password-requirements li {
            margin: 2px 0;
        }

        .password-requirements li.met {
            color: #10B981;
        }

        .form-checkbox {
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }

        .form-checkbox input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            margin-top: 2px;
            flex-shrink: 0;
        }

        .form-checkbox label {
            font-size: 14px;
            color: #374151;
            cursor: pointer;
            line-height: 1.5;
        }

        .form-checkbox label a {
            color: #667eea;
            text-decoration: none;
        }

        .form-checkbox label a:hover {
            text-decoration: underline;
        }

        .btn {
            width: 100%;
            padding: 14px 24px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .auth-divider {
            text-align: center;
            margin: 24px 0;
            position: relative;
        }

        .auth-divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #E5E7EB;
        }

        .auth-divider span {
            background: white;
            padding: 0 16px;
            position: relative;
            color: #6B7280;
            font-size: 14px;
        }

        .social-login {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }

        .btn-social {
            padding: 12px;
            border: 2px solid #E5E7EB;
            background: white;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-social:hover {
            border-color: #667eea;
            background: #F9FAFB;
        }

        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: #6B7280;
        }

        .auth-footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 640px) {
            .auth-card {
                padding: 32px 24px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">RE</div>
                <h1 class="auth-title">Create Account</h1>
                <p class="auth-subtitle">Start extracting receipts with AI</p>
            </div>

            <form id="registerForm">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="firstName">
                            First Name <span class="required">*</span>
                        </label>
                        <input 
                            type="text" 
                            id="firstName" 
                            name="firstName" 
                            class="form-input" 
                            placeholder="John"
                            required 
                            autocomplete="given-name"
                        >
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="lastName">
                            Last Name <span class="required">*</span>
                        </label>
                        <input 
                            type="text" 
                            id="lastName" 
                            name="lastName" 
                            class="form-input" 
                            placeholder="Doe"
                            required 
                            autocomplete="family-name"
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">
                        Email Address <span class="required">*</span>
                    </label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        class="form-input" 
                        placeholder="you@example.com"
                        required 
                        autocomplete="email"
                    >
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">
                        Password <span class="required">*</span>
                    </label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        class="form-input" 
                        placeholder="••••••••"
                        required 
                        autocomplete="new-password"
                    >
                    <div class="password-strength">
                        <div class="password-strength-bar" id="passwordStrengthBar"></div>
                    </div>
                    <div class="password-requirements">
                        <ul id="passwordRequirements">
                            <li data-requirement="length">At least 8 characters</li>
                            <li data-requirement="uppercase">One uppercase letter</li>
                            <li data-requirement="lowercase">One lowercase letter</li>
                            <li data-requirement="number">One number</li>
                        </ul>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirmPassword">
                        Confirm Password <span class="required">*</span>
                    </label>
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        name="confirmPassword" 
                        class="form-input" 
                        placeholder="••••••••"
                        required 
                        autocomplete="new-password"
                    >
                </div>

                <div class="form-group">
                    <div class="form-checkbox">
                        <input type="checkbox" id="agreeTerms" name="agreeTerms" required>
                        <label for="agreeTerms">
                            I agree to the <a href="terms.html" target="_blank">Terms of Service</a> 
                            and <a href="privacy.html" target="_blank">Privacy Policy</a>
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <div class="form-checkbox">
                        <input type="checkbox" id="newsletter" name="newsletter" checked>
                        <label for="newsletter">
                            Send me product updates and tips via email
                        </label>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" id="submitBtn">
                    Create Account
                </button>
            </form>

            <div class="auth-divider">
                <span>Or sign up with</span>
            </div>

            <div class="social-login">
                <button type="button" class="btn-social" id="googleBtn">
                    <svg width="20" height="20" viewBox="0 0 20 20">
                        <path fill="#4285F4" d="M19.6 10.23c0-.82-.1-1.42-.25-2.05H10v3.72h5.5c-.15.96-.74 2.31-2.04 3.22v2.45h3.16c1.89-1.73 2.98-4.3 2.98-7.34z"/>
                        <path fill="#34A853" d="M13.46 15.13c-.83.59-1.96 1-3.46 1-2.64 0-4.88-1.74-5.68-4.15H1.07v2.52C2.72 17.75 6.09 20 10 20c2.7 0 4.96-.89 6.62-2.42l-3.16-2.45z"/>
                        <path fill="#FBBC05" d="M3.99 10c0-.69.12-1.35.32-1.97V5.51H1.07A9.973 9.973 0 000 10c0 1.61.39 3.14 1.07 4.49l3.24-2.52c-.2-.62-.32-1.28-.32-1.97z"/>
                        <path fill="#EA4335" d="M10 3.88c1.88 0 3.13.81 3.85 1.48l2.84-2.76C14.96.99 12.7 0 10 0 6.09 0 2.72 2.25 1.07 5.51l3.24 2.52C5.12 5.62 7.36 3.88 10 3.88z"/>
                    </svg>
                    Google
                </button>
                <button type="button" class="btn-social" id="githubBtn">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 0C4.477 0 0 4.484 0 10.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0110 4.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.203 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.942.359.31.678.921.678 1.856 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0020 10.017C20 4.484 15.522 0 10 0z" clip-rule="evenodd"/>
                    </svg>
                    GitHub
                </button>
            </div>

            <div class="auth-footer">
                Already have an account? <a href="enhanced-login.html">Sign in</a>
            </div>
        </div>

        <div class="auth-footer" style="margin-top: 24px; color: rgba(255, 255, 255, 0.8);">
            <a href="index.html" style="color: white;">← Back to home</a>
        </div>
    </div>

    <!-- Scripts -->
    <script src="utils/toast.js"></script>
    <script src="utils/form-validator.js"></script>
    <script src="utils/auth-manager.js"></script>
    <script src="utils/api-client.js"></script>
    
    <script>
        // Form elements
        const form = document.getElementById('registerForm');
        const submitBtn = document.getElementById('submitBtn');
        const passwordInput = document.getElementById('password');
        const passwordStrengthBar = document.getElementById('passwordStrengthBar');
        const googleBtn = document.getElementById('googleBtn');
        const githubBtn = document.getElementById('githubBtn');

        // Password strength checker
        function checkPasswordStrength(password) {
            let strength = 0;
            const requirements = {
                length: password.length >= 8,
                uppercase: /[A-Z]/.test(password),
                lowercase: /[a-z]/.test(password),
                number: /\d/.test(password)
            };

            // Update requirement indicators
            Object.keys(requirements).forEach(req => {
                const li = document.querySelector(`[data-requirement="${req}"]`);
                if (li) {
                    if (requirements[req]) {
                        li.classList.add('met');
                        strength++;
                    } else {
                        li.classList.remove('met');
                    }
                }
            });

            // Update strength bar
            passwordStrengthBar.className = 'password-strength-bar';
            if (strength <= 2) {
                passwordStrengthBar.classList.add('weak');
            } else if (strength === 3) {
                passwordStrengthBar.classList.add('medium');
            } else if (strength === 4) {
                passwordStrengthBar.classList.add('strong');
            }

            return strength;
        }

        // Listen to password input
        passwordInput.addEventListener('input', (e) => {
            checkPasswordStrength(e.target.value);
        });

        // Form validation
        const validator = new FormValidator(form, {
            firstName: {
                required: 'First name is required',
                minLength: 2,
                minLengthMessage: 'First name must be at least 2 characters'
            },
            lastName: {
                required: 'Last name is required',
                minLength: 2,
                minLengthMessage: 'Last name must be at least 2 characters'
            },
            email: {
                required: 'Email is required',
                email: true
            },
            password: {
                required: 'Password is required',
                minLength: 8,
                custom: (value) => {
                    if (!/[A-Z]/.test(value)) {
                        return 'Password must contain an uppercase letter';
                    }
                    if (!/[a-z]/.test(value)) {
                        return 'Password must contain a lowercase letter';
                    }
                    if (!/\d/.test(value)) {
                        return 'Password must contain a number';
                    }
                    return null;
                }
            },
            confirmPassword: {
                required: 'Please confirm your password',
                custom: (value) => {
                    const password = document.getElementById('password').value;
                    if (value !== password) {
                        return 'Passwords do not match';
                    }
                    return null;
                }
            },
            agreeTerms: {
                required: 'You must agree to the terms'
            }
        }, {
            validateOnBlur: true,
            onSubmit: handleRegister
        });

        // Handle registration
        async function handleRegister(data, event) {
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading-spinner"></span> Creating account...';

            try {
                const userData = {
                    first_name: data.firstName,
                    last_name: data.lastName,
                    email: data.email,
                    password: data.password,
                    newsletter: data.newsletter
                };

                const result = await authManager.register(userData);

                if (result.success) {
                    toast.success('Account created successfully!', 'Welcome!');
                    
                    // Redirect after short delay
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1000);
                } else {
                    toast.error(result.error || 'Registration failed', 'Registration Error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Create Account';
                }
            } catch (error) {
                toast.error(error.message || 'An error occurred', 'Registration Error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Create Account';
            }
        }

        // Social signup handlers
        googleBtn.addEventListener('click', () => {
            toast.info('Google OAuth integration coming soon!', 'Coming Soon');
        });

        githubBtn.addEventListener('click', () => {
            toast.info('GitHub OAuth integration coming soon!', 'Coming Soon');
        });

        // Check if already logged in
        if (authManager.isAuthenticated()) {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
