# Pre-commit hooks for code quality
# Install: pip install pre-commit
# Setup: pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # Python syntax validation
  - repo: local
    hooks:
      - id: python-syntax-check
        name: Python Syntax Check
        entry: python -m py_compile
        language: system
        files: \.py$
        pass_filenames: true
        
  # Check for large files (prevent binary commits)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-added-large-files
        args: ['--maxkb=10240']  # 10MB max
        
      - id: check-merge-conflict
        name: Check for merge conflict markers
        
      - id: trailing-whitespace
        name: Trim trailing whitespace
        
      - id: end-of-file-fixer
        name: Ensure files end with newline
        
      - id: check-yaml
        name: Check YAML syntax
        
      - id: check-json
        name: Check JSON syntax
        
      - id: check-toml
        name: Check TOML syntax
        
      - id: check-case-conflict
        name: Check for case conflicts
        
      - id: mixed-line-ending
        name: Check for mixed line endings
        
  # Python import sorting
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        name: Sort Python imports
        args: ['--profile', 'black', '--line-length', '100']
        
  # Python code formatting
  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        name: Format Python code with Black
        args: ['--line-length', '100']
        language_version: python3
        
  # Python linting (non-blocking initially - warnings only)
  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        name: Lint Python code with Flake8
        args: 
          - '--max-line-length=100'
          - '--extend-ignore=E203,E501,W503'
          - '--max-complexity=15'
        # Non-blocking: exit 0 even with errors (for now)
        # Remove 'verbose: true' to make blocking later
        verbose: true
