# nginx vhost for image-to-text.fit
# After first deploy, obtain TLS certificates:
#   certbot --nginx -d image-to-text.fit -d www.image-to-text.fit
# Certbot will update the HTTPS block's ssl_certificate paths automatically.

server {
    listen 80;
    listen [::]:80;
    server_name image-to-text.fit www.image-to-text.fit;

    # ACME challenge passthrough for certbot renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all plain HTTP to HTTPS (and www to apex)
    location / {
        return 301 https://image-to-text.fit$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.image-to-text.fit;

    ssl_certificate     /etc/letsencrypt/live/image-to-text.fit/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/image-to-text.fit/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Redirect www to apex
    return 301 https://image-to-text.fit$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name image-to-text.fit;

    ssl_certificate     /etc/letsencrypt/live/image-to-text.fit/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/image-to-text.fit/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # HTTP Strict Transport Security — 2 years
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Prevent clickjacking
    add_header X-Frame-Options "DENY" always;

    # Prevent MIME-type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Referrer policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Disable unused browser features
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}
