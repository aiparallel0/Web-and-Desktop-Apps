# nginx HTTP-only stub for image-to-text.fit
# Used during initial install BEFORE certbot obtains TLS certificates.
# install.sh replaces this with image-to-text.fit.conf after certbot runs.

server {
    listen 80;
    listen [::]:80;
    server_name image-to-text.fit www.image-to-text.fit;

    # ACME challenge passthrough for certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Temporary health-check response so nginx -t and reload succeed
    location / {
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
